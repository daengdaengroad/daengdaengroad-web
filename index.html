<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>댕댕로드</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e9dfcf;
  display: flex;
  justify-content: center;
}

.app {
  width: 360px;
  background: #f3e8d8;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.header {
  background: linear-gradient(#d9b98c, #b8925c);
  padding: 20px;
  color: white;
  text-align: center;
}

.section {
  padding: 16px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #d89c3d;
  border-radius: 12px;
  overflow: hidden;
  height: 100px;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.button {
  margin: 20px;
  padding: 14px;
  text-align: center;
  background: #b8925c;
  border-radius: 12px;
  color: white;
  font-weight: bold;
}

.footer {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: white;
}

.footer img {
  width: 28px;
  height: 28px;
}
</style>
</head>

<body>

<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <h3>꼬마랑 어디 갈까요? 🐶</h3>
  </div>

  <!-- 장소 -->
  <div class="section">
    <h4>장소</h4>
    <div class="grid">
      <div class="card"><img src="/cafe.jpg"></div>
      <div class="card"><img src="/food.png"></div>
    </div>
  </div>

  <!-- 거리 -->
  <div class="section">
    <h4>거리</h4>
    <div class="grid">
      <div class="card"><img src="/walk.png"></div>
      <div class="card"><img src="/drive.png"></div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="button">
    코스 만들기
  </div>

  <!-- 하단 -->
  <div class="footer">
    <img src="/home.png">
    <img src="/heart.png">
    <img src="/mydog.png">
  </div>

</div>

</body>
</html>
<script>
async function generateCourse() {
  try {
    const data = {
      lat: 37.5665,   // 서울 (테스트용)
      lng: 126.9780,
      activity: "애견카페",
      duration: "30분 거리"
    };

    const res = await fetch('https://daengdaengroad-production.up.railway.app/api/generate-course', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await res.json();

    console.log(result);

    alert("코스 생성 완료! 콘솔 확인");

  } catch (err) {
    console.error(err);
    alert("에러 발생");
  }
}
</script>
